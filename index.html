<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interstellar — Solar System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #canvas { display: block; width: 100%; height: 100%; }
    #ui {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      color: rgba(255,255,255,0.7);
      font-family: system-ui, sans-serif;
      font-size: 0.85rem;
      pointer-events: none;
    }
    #ui span { display: block; margin-top: 0.25rem; }
    #free-view-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      padding: 0.5rem 0.75rem;
      font-family: system-ui, sans-serif;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.95);
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      cursor: pointer;
      pointer-events: auto;
      display: none;
      z-index: 20;
    }
    #free-view-btn:hover { background: rgba(40,40,40,0.8); }
    #travel-to {
      position: fixed;
      top: 1rem;
      left: 1rem;
      font-family: system-ui, sans-serif;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.85);
      pointer-events: auto;
      z-index: 20;
    }
    #travel-to p { margin-bottom: 0.35rem; opacity: 0.9; }
    #travel-to a {
      display: inline-block;
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      padding: 0.2rem 0.5rem;
      margin: 0.1rem 0.15rem 0.1rem 0;
      background: rgba(0,0,0,0.4);
      border-radius: 4px;
      cursor: pointer;
    }
    #travel-to a:hover { background: rgba(60,60,80,0.7); }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="travel-to"><p>Travel to:</p></div>
  <button type="button" id="free-view-btn">← Free view</button>
  <div id="ui">
    <span>Drag to orbit · Scroll to zoom</span>
    <span id="zoom-label">Zoom: Solar system</span>
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="js/space.js"></script>
</body>
</html>
